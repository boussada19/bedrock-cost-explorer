name: Deploy — Bedrock Cost Explorer

on:
  push:
    branches:
      - main

# Only one deploy runs at a time; a new push cancels an in-progress one
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1 # Frankfurt
  NODE_VERSION: "22" # Node 24 runner-compatible LTS
  PYTHON_VERSION: "3.12"
  CDK_APP_DIR: infrastructure

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Python tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          # Tell setup-python exactly where the requirements file lives
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          EVENTS_TABLE: bedrock_events
          PRICE_TABLE: bedrock_price_table
          RECONCILIATION_TABLE: bedrock_reconciliation_runs
          COST_ENRICHMENT_QUEUE_URL: https://sqs.eu-central-1.amazonaws.com/123456789012/bedrock-cost-enrichment
          ALERT_TOPIC_ARN: arn:aws:sns:eu-central-1:123456789012:bedrock-cost-alerts
        run: |
          pytest tests/ -v --tb=short \
            --cov \
            --cov-config=pytest.ini \
            --cov-report=term-missing

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — CDK synth (validates TypeScript compiles + stack is valid)
  # ────────────────────────────────────────────────────────────────
  synth:
    name: CDK synth
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.CDK_APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.CDK_APP_DIR }}/package-lock.json

      - name: Install CDK dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: CDK synth (validate stack)
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          CUR_BUCKET_NAME: ${{ secrets.CUR_BUCKET_NAME }}
        run: npx cdk synth --quiet

      - name: Upload CDK cloud assembly
        uses: actions/upload-artifact@v4
        with:
          name: cdk-assembly
          path: ${{ env.CDK_APP_DIR }}/cdk.out
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to AWS
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: CDK deploy
    runs-on: ubuntu-latest
    needs: [test, synth]
    environment: production
    defaults:
      run:
        working-directory: ${{ env.CDK_APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.CDK_APP_DIR }}/package-lock.json

      - name: Install CDK dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK bootstrap
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          CUR_BUCKET_NAME: ${{ secrets.CUR_BUCKET_NAME }}
        run: |
          # Check if CDKToolkit stack already exists and is complete
          STATUS=$(aws cloudformation describe-stacks             --stack-name CDKToolkit             --region ${{ env.AWS_REGION }}             --query "Stacks[0].StackStatus"             --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "CREATE_COMPLETE" || "$STATUS" == "UPDATE_COMPLETE" ]]; then
            echo "CDKToolkit already bootstrapped (status: $STATUS) — skipping"
          else
            echo "Bootstrapping CDK (current status: $STATUS)"
            npx cdk bootstrap               aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}               --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess
          fi

      - name: CDK deploy
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          CUR_BUCKET_NAME: ${{ secrets.CUR_BUCKET_NAME }}
        run: |
          npx cdk deploy BedrockCostExplorer \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            --progress events

      - name: Show stack outputs
        run: |
          echo "### Stack outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat cdk-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: ${{ env.CDK_APP_DIR }}/cdk-outputs.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy dashboard to S3
  # ────────────────────────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy dashboard
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create bucket if not exists
        run: |
          aws s3api head-bucket --bucket bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }} 2>/dev/null ||           aws s3 mb s3://bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }} --region ${{ env.AWS_REGION }}

      - name: Configure static website hosting
        run: |
          aws s3api put-public-access-block             --bucket bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}             --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          aws s3 website s3://bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}             --index-document index.html
          aws s3api put-bucket-policy             --bucket bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}             --policy '{"Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}/*"}]}'

      - name: Upload dashboard
        run: |
          aws s3 cp dashboard/index.html             s3://bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}/index.html             --content-type "text/html"

      - name: Print dashboard URL
        run: |
          echo "### Dashboard deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: http://bedrock-cost-dashboard-${{ secrets.AWS_ACCOUNT_ID }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # JOB 5 — Seed price table (runs when seed file changes)
  # ────────────────────────────────────────────────────────────────
  seed-prices:
    name: Seed price table
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      contains(github.event.commits[*].modified, 'scripts/seed_prices.py') ||
      contains(github.event.commits[*].added, 'scripts/seed_prices.py')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install boto3
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed price table
        run: |
          python scripts/seed_prices.py \
            --table bedrock_price_table \
            --region ${{ env.AWS_REGION }}
